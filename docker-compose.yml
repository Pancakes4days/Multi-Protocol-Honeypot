version: '3.8'

services:
  honeypot:
    build: .
    container_name: minecraft-honeypot
    # Run as the host user so the bind-mounted ./logs stays writable by both the
    # container and you (no root, no chown dance). Defaults to 1000 (the typical
    # first VPS user); setup.sh writes a .env with your actual uid/gid so manual
    # docker-compose commands pick it up too.
    user: "${HONEYPOT_UID:-1000}:${HONEYPOT_GID:-1000}"
    # Bind only the honeypot port. This is the single intended exposure.
    ports:
      - "25565:25565"
    volumes:
      # Logs are the only writable path on the host; keep them out of the
      # container's root filesystem.
      - ./logs:/logs
    restart: unless-stopped
    environment:
      - TZ=UTC

    # --- Container hardening --------------------------------------------------
    # The honeypot deliberately attracts hostile traffic, so the blast radius
    # of any bug must be as small as possible.
    read_only: true                 # immutable root filesystem
    cap_drop:
      - ALL                         # no Linux capabilities at all
    security_opt:
      - no-new-privileges:true      # block setuid privilege escalation
    tmpfs:
      - /tmp:size=16m,mode=1777     # small scratch space, non-persistent

    # Resource caps so a flood can't exhaust the host.
    mem_limit: 256m
    pids_limit: 256
    cpus: 0.5

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
